name: Deploy Saga to Cloudflare Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build tools
        run: brew install loopwerk/tap/saga imagemagick

      - name: Build site
        run: saga build

      - name: Verify build output
        run: test -f deploy/index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy deploy --project-name=rychillie --branch=main
