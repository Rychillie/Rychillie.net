included:
  - Package.swift
  - Sources/Rychillie

excluded:
  - .build
  - .swiftpm
  - deploy
  - content/static/styles.css
  - content/static/home/optimized
  - Sources/Scripts

strict: true

disabled_rules:
  - trailing_comma

line_length:
  warning: 340
  error: 380
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true
  ignores_multiline_strings: true

function_body_length:
  warning: 100
  error: 150

file_length:
  warning: 500
  error: 1000

reporter: xcode
